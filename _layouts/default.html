<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <script>
        (function() {
            try {
                var t = localStorage.getItem('theme');
                if (t === 'dark' || t === 'light') {
                    document.documentElement.setAttribute('data-theme', t);
                }
            } catch (e) {}
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
    <header class="site-header">
        <nav class="navbar">
            <a href="{{ '/' | relative_url }}" class="logo">FERNANDO_DEV</a>

            <ul class="nav-menu" id="navMenu">
                <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="is-active"{% endif %}>Inicio</a></li>
                <li><a href="{{ '/projects/' | relative_url }}"{% if page.url contains '/projects' %} class="is-active"{% endif %}>Proyectos</a></li>
                <li><a href="{{ '/about/' | relative_url }}"{% if page.url contains '/about' %} class="is-active"{% endif %}>Sobre Mí</a></li>
                <li><a href="{{ '/contact/' | relative_url }}" class="btn btn-primary nav-cta">Contactar</a></li>
            </ul>

            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
                    <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Menú" aria-controls="navMenu" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="main-content">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">© {{ 'now' | date: "%Y" }} / FERNANDO_DEV / MÁLAGA</div>
            <div class="footer-links">
                <a href="{{ '/' | relative_url }}">Inicio</a>
                <a href="{{ '/projects/' | relative_url }}">Proyectos</a>
                <a href="{{ '/about/' | relative_url }}">Sobre mí</a>
                <a href="{{ '/contact/' | relative_url }}">Contacto</a>
                <div class="footer-social">
                    {% if site.github_username %}
                    <a class="footer-icon" href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" aria-label="GitHub">
                        <span class="material-symbols-outlined">code</span>
                    </a>
                    {% endif %}
                    {% if site.linkedin_username %}
                    <a class="footer-icon" href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener" aria-label="LinkedIn">
                        <span class="material-symbols-outlined">work</span>
                    </a>
                    {% endif %}
                    <a class="footer-icon" href="mailto:{{ site.email }}" aria-label="Email">
                        <span class="material-symbols-outlined">mail</span>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
