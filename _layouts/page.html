---
layout: default
---

<article class="page-content">
    <div class="container">
        <header class="page-header">
            <span class="eyebrow">// {{ page.title | upcase }}</span>
            <h1>{{ page.title }}</h1>
            {% if page.description %}
            <p class="hero-description" style="margin-top: var(--s-3);">{{ page.description }}</p>
            {% endif %}
        </header>
        <div class="content">
            {{ content }}
        </div>
    </div>
</article>
